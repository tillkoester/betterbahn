name: CI
on:
  - push
  - pull_request
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '25'
      - name: Install modules
        run: pnpm install
      - name: Run Typecheck
        run: pnpm tsc
      - name: Run Oxlint
        run: pnpm run oxlint
      - run: pnpm run build
